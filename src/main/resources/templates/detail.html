<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title th:text="${work.title} + ' | Details'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<main class="container" style="padding-top: 100px;">
    <a th:href="@{/}" class="btn-detail" style="border: none; margin-bottom: 40px;">← BACK TO LIST</a>

    <h1 th:text="${work.title}" style="display: block; border: none; text-align: left; padding: 0; font-weight: 700;"></h1>
    <p class="tech-stack" th:text="'Technologies: ' + ${work.techStack}"></p>

    <div class="work-card" style="border: none;">
        <h2 style="font-size: 1.1rem; margin-top: 40px;">OVERVIEW</h2>
        <p class="description" th:text="${work.descriptionDetail}"></p>

        <h2 style="font-size: 1.1rem; margin-top: 40px;">DIFFICULTIES & SOLUTIONS</h2>
        <div style="background: #f9f9f9; padding: 30px; border-radius: 4px;">
            <p style="font-size: 0.9rem; font-weight: 700; color: #888;">CHALLENGE</p>
            <p class="description" th:text="${work.difficulties}"></p>
            <p style="font-size: 0.9rem; font-weight: 700; color: #888; margin-top: 20px;">SOLUTION</p>
            <p class="description" th:text="${work.solutions}"></p>
        </div>

        <div style="margin-top: 60px;">
            <a th:href="${work.githubUrl}" target="_blank" class="btn-detail">VIEW ON GITHUB</a>
        </div>
    </div>
</main>

</body>
</html>
