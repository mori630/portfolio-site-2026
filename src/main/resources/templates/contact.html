<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<header>
    <a href="/" style="text-decoration: none; font-size: 24px; font-weight: bold; color: #333;">
        ← BACK TO HOME
    </a>
    </header>

    <main class="container" style="max-width: 600px; padding-top: 50px;">
        <h1>CONTACT ME.</h1>
        <form th:action="@{/contact/send}" th:object="${contactForm}" method="post">

            <div class="form-group">
                <label>お問い合わせの目的 <span class="required">*</span></label>
                <select name="purpose">
                    <option value="">選択してください</option>
                    <option value="work">お仕事の依頼</option>
                    <option value="other">その他</option>
                </select>
            </div>

            <div class="form-group">
                <label>お名前 <span class="required">*</span></label>
                <input type="text" name="name" placeholder="例：山田 太郎" required>
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></p>
            </div>

            <div class="form-group">
                <label>メールアドレス <span class="required">*</span></label>
                <input type="email" name="email" placeholder="例：hello@example.jp" required>
            </div>

            <div class="form-group">
                <label>ご依頼元企業・団体名</label>
                <input type="text" name="company" placeholder="例：株式会社〇〇">
            </div>

            <div class="form-group">
                <label>役職</label>
                <input type="text" name="position" placeholder="例：営業部長">
            </div>

            <div class="form-group">
                <label>Webサイトなど、URLがあれば教えてください</label>
                <input type="url" name="url" placeholder="例：https://example.com">
            </div>

            <div class="form-group">
                <label>お問い合わせ内容 <span class="required">*</span></label>
                <textarea name="message" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn-detail">SEND MESSAGE</button>
        </form>
    </main>

</body>
</html>
