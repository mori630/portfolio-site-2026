<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | My Works</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <h1>PORTFOLIO</h1>
</header>

<main class="container">
    <div th:each="work : ${works}" class="work-card">
        <div class="work-title" th:text="${work.title}">作品タイトル</div>
        <div class="tech-stack" th:text="'Technologies: ' + ${work.techStack}">使用技術</div>
        <p class="description" th:text="${work.descriptionShort}">説明文（短文）</p>

        <a href="#" style="color: #333; text-decoration: none; border-bottom: 1px solid #333; font-size: 0.8rem;">VIEW DETAILS</a>
    </div>
</main>

</body>
</html>
