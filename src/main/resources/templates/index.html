<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | My Works</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <h1>PORTFOLIO</h1>
    <nav class="nav-menu">
        <a href="#projects">PROJECTS</a>
        <a href="#about">ABOUT</a>
        <a href="#">CONTACT</a>
    </nav>
</header>

<section id="about" class="container" style="padding-top: 100px;">
    <h2 style="font-size: 1.2rem; margin-bottom: 40px; letter-spacing: 0.1em;">ABOUT</h2>
    <div class="about-content">
        <p>
            私は Java と Spring Boot を中心に開発を行っているエンジニアです。<br>
            シンプルで機能的なウェブサイトの設計と実装を信条としています。<br>
            技術を通じて、誰かの日常を少しだけ豊かにすることを目指しています。
        </p>
    </div>

    <div class="skill-container">
        <h3 style="font-size: 0.8rem; letter-spacing: 0.1em; color: #888; margin-top: 40px;">SKILLS</h3>
        <ul class="skill-list">
            <li>Java</li>
            <li>Spring Boot</li>
            <li>Thymeleaf</li>
            <li>SQL (H2 / MySQL)</li>
            <li>HTML / CSS</li>
            <li>Git / GitHub</li>
        </ul>
    </div>

</section>

<main class="container" id="projects">
    <div th:each="work : ${works}" class="work-card">

        <div class="work-title" th:text="${work.title}">作品タイトル</div>
        <div class="tech-stack" th:text="'Technologies: ' + ${work.techStack}">使用技術</div>
        <p class="description" th:text="${work.descriptionShort}">説明文（短文）</p>

        <a th:href="@{/work/{id}(id=${work.id})}" class="btn-detail">VIEW DETAILS</a>

    </div>
</main>

</body>
</html>
